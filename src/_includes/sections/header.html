
<!-- ============================================ -->
<!--                 Navigation                   -->
<!-- ============================================ -->

<nav id="navbar">
    <div class="cs-container">
        <!-- Nav Logo -->
        <a href="/" class="nav-logo" aria-label="Studio 3 Home page">
            Studio <span>3</span>
        </a>
        
        <!-- Mobile Nav Toggle -->
        <button class="cs-toggle" id="cs-toggle" aria-expanded="false" aria-controls="cs-ul-wrapper" aria-label="mobile menu toggle" aria-haspopup="menu">
            <span class="cs-box" aria-hidden="true">
                <span class="cs-line cs-line1" aria-hidden="true"></span>
                <span class="cs-line cs-line2" aria-hidden="true"></span>
                <span class="cs-line cs-line3" aria-hidden="true"></span>
            </span>
        </button>
        
        <!-- Navigation List Wrapper -->
        <div class="cs-ul-wrapper" id="cs-ul-wrapper" inert>
            <ul class="nav-links">
                <!-- About Link -->
                <li class="cs-li">
                    <a href="/a-propos/" class="cs-li-link">
                        À propos
                    </a>
                </li>
                
                <!-- Services Dropdown -->
                <li class="cs-li cs-dropdown">
                    <button class="cs-li-link cs-dropdown-toggle" aria-haspopup="menu" aria-expanded="false" id="services-dropdown-toggle">
                        Services
                        <img class="cs-drop-icon" src="/assets/svgs/dropdown.svg" alt="" width="15" height="15" decoding="async" aria-hidden="true">
                    </button>
                    <ul class="cs-drop-ul" aria-labelledby="services-dropdown-toggle">
                        <li class="cs-drop-li">
                            <a href="/coiffure-femme/" class="cs-li-link cs-drop-link">Coiffure Femme</a>
                        </li>
                        <li class="cs-drop-li">
                            <a href="/coiffure-homme/" class="cs-li-link cs-drop-link">Coiffure Homme</a>
                        </li>
                    </ul>
                </li>
                
                <li class="cs-li">
                    <a href="/galerie/" class="cs-li-link">
                        Galerie
                    </a>
                </li>

                <!-- Contact Link -->
                <li class="cs-li">
                    <a href="/contact/" class="cs-li-link">
                        Contact
                    </a>
                </li>
                
                <!-- Booking CTA (visible in mobile menu) -->
                <li class="cs-li">
                    <a href="https://salonkee.lu/salon/studio-3" class="nav-cta">
                        Réserver
                    </a>
                </li>
            </ul>
        </div>
        
        <!-- Desktop CTA Button (visible only on desktop) -->
        <a href="https://salonkee.lu/salon/studio-3" class="nav-cta desktop-cta">Réserver</a>
    </div>
</nav>

<script>// ─── MOBILE NAV ──────────────────────────────────────────────────────────────
    const nav       = document.getElementById('navbar');
    const toggle    = document.getElementById('cs-toggle');
    const ulWrapper = document.getElementById('cs-ul-wrapper');
    
    // Hamburger open/close
    toggle.addEventListener('click', () => {
      const isOpen = nav.classList.toggle('cs-active');
      toggle.setAttribute('aria-expanded', isOpen);
      document.body.classList.toggle('cs-open', isOpen);
    
      // inert prevents tab-focus when menu is closed
      if (isOpen) {
        ulWrapper.removeAttribute('inert');
      } else {
        ulWrapper.setAttribute('inert', '');
      }
    });
    
    // Close menu when a non-dropdown link is clicked
    ulWrapper.querySelectorAll('.cs-li-link:not(.cs-dropdown-toggle)').forEach(link => {
      link.addEventListener('click', () => {
        nav.classList.remove('cs-active');
        toggle.setAttribute('aria-expanded', 'false');
        document.body.classList.remove('cs-open');
        ulWrapper.setAttribute('inert', '');
      });
    });
    
    // Mobile dropdown toggle
    document.querySelectorAll('.cs-dropdown-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const dropdown = btn.closest('.cs-dropdown');
        const isOpen   = dropdown.classList.toggle('cs-active');
        btn.setAttribute('aria-expanded', isOpen);
      });
    });</script>
